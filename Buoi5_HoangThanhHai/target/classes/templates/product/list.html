<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Product List</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        img{
            width:80px;
        }
        footer{
            text-align:center;
            margin-top:40px;
            color:gray;
        }
    </style>
</head>

<body>

<!-- MENU -->
<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand text-white" href="#">Home</a>
        <a class="navbar-brand text-white" href="/products">Products</a>
    </div>
</nav>

<div class="container mt-4">

    <!-- CREATE BUTTON -->
    <a class="btn btn-primary mb-3" th:href="@{/products/add}">
        Create New Product
    </a>

    <!-- TABLE -->
    <table class="table table-bordered table-striped">

        <thead class="table-light">
        <tr>
            <th>#</th>
            <th>Name</th>
            <th>Image</th>
            <th>Price</th>
            <th>Category Name</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="product, stat : ${products}">

            <td th:text="${stat.index + 1}"></td>

            <td th:text="${product.name}"></td>

            <td>
                <img th:src="${product.image}" alt="">
            </td>

            <td th:text="${product.price}"></td>

            <td th:text="${product.category != null ? product.category.name : ''}"></td>

            <td>
                <a th:href="@{/products/edit/{id}(id=${product.id})}"
                   class="btn btn-secondary btn-sm">
                    Edit
                </a>

                <a th:href="@{/products/delete/{id}(id=${product.id})}"
                   class="btn btn-danger btn-sm">
                    Delete
                </a>
            </td>

        </tr>

        </tbody>

    </table>

</div>

<footer>
    © 2025 - Phát triển ứng dụng với J2EE
</footer>

</body>
</html>
