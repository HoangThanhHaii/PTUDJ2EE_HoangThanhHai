<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sửa sách</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; padding: 20px; }
        h1 { text-align: center; color: #2c3e50; }
        form {
            max-width: 400px;
            margin: 30px auto;
            padding: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        label { display: block; margin-top: 10px; font-weight: bold; color: #34495e; }
        input[type="text"] { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { margin-top: 15px; padding: 10px 15px; background: #27ae60; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #1e8449; }
    </style>
</head>
<body>
<h1>Sửa sách</h1>
<form action="/books/edit" method="post" th:object="${book}">
    <input type="hidden" th:field="*{id}" />
    <label for="title">Tiêu đề:</label>
    <input type="text" id="title" th:field="*{title}" required />
    <label for="author">Tác giả:</label>
    <input type="text" id="author" th:field="*{author}" required />
    <button type="submit">Cập nhật</button>
</form>
</body>
</html>
